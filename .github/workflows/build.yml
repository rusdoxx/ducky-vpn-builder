name: 🦆 Build Ducky VPN APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Ощипываем исходники и собираем APK
    runs-on: ubuntu-latest

    steps:
      - name: 🛠 Настройка Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐹 Настройка Go (Устанавливаем компилятор ядра)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: ⚙️ Установка GoMobile (Мост между Go и Android)
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: 📥 Клонирование топового ядра с сабмодулями
        run: git clone --depth 1 --recursive https://github.com/2dust/v2rayNG.git V2rayNG

      - name: 🧬 Генная инженерия (Ребрендинг в Ducky VPN)
        run: |
          cd V2rayNG
          # Исправлен путь: папка называется v2rayNG, а не app
          sed -i 's/<string name="app_name">v2rayNG<\/string>/<string name="app_name">Ducky VPN<\/string>/g' v2rayNG/src/main/res/values/strings.xml
          
      - name: 🏗 Сборка APK (Интерфейс + Ядро)
        run: |
          cd V2rayNG
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 📦 Выгрузка готового файла
        uses: actions/upload-artifact@v4
        with:
          name: 🦆 Ducky-VPN-App
          # Исправлен путь поиска готового файла
          path: V2rayNG/v2rayNG/build/outputs/apk/**/*.apk
