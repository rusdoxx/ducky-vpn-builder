name: 🦆 Build Ducky VPN APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Ощипываем исходники и собираем APK
    runs-on: ubuntu-latest

    steps:
      - name: 🛠 Настройка Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐹 Настройка Go (Устанавливаем компилятор ядра)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: ⚙️ Установка GoMobile (Мост между Go и Android)
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: 📥 Клонирование топового ядра с сабмодулями
        # Флаг --recursive заставляет GitHub скачать ВСЕ внутренние зависимости (то самое ядро)
        run: git clone --depth 1 --recursive https://github.com/2dust/v2rayNG.git V2rayNG

      - name: 🧬 Генная инженерия (Ребрендинг в Ducky VPN)
        run: |
          cd V2rayNG
          # Меняем название приложения на Ducky VPN
          sed -i 's/<string name="app_name">v2rayNG<\/string>/<string name="app_name">Ducky VPN<\/string>/g' app/src/main/res/values/strings.xml
          
      - name: 🏗 Сборка APK (Интерфейс + Ядро)
        run: |
          cd V2rayNG
          chmod +x ./gradlew
          # Сборка теперь автоматически подхватит GoMobile и скомпилирует Libv2ray!
          ./gradlew assembleDebug --no-daemon

      - name: 📦 Выгрузка готового файла
        uses: actions/upload-artifact@v4
        with:
          name: 🦆 Ducky-VPN-App
          path: V2rayNG/app/build/outputs/apk/debug/*.apk
