name: 🏴‍☠️ Build Ducky VPN (Pirate Edition)

on:
  workflow_dispatch:

jobs:
  hack-apk:
    name: Взлом и ребрендинг APK
    runs-on: ubuntu-latest

    steps:
      - name: 🛠 Настройка Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📥 Установка хакерских утилит (Apktool & Apksigner)
        run: |
          wget https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner

      - name: 📦 Скачивание официального релизного APK
        run: |
          wget https://github.com/2dust/v2rayNG/releases/download/1.8.35/v2rayNG_1.8.35_universal.apk -O base.apk

      - name: 🔓 Декомпиляция (Вскрытие APK)
        run: java -jar apktool.jar d base.apk -o ducky_source -f

      - name: 🧬 Ребрендинг в Ducky VPN
        run: |
          STRINGS_FILE=$(find ducky_source/res -name "strings.xml" | grep "values/strings.xml" | head -n 1)
          sed -i 's/>v2rayNG</>Ducky VPN</g' "$STRINGS_FILE"
          sed -i 's/"app_name">v2rayNG</"app_name">Ducky VPN</g' "$STRINGS_FILE"

      - name: 🔒 Сборка взломанного APK
        run: java -jar apktool.jar b ducky_source -o unsigned.apk

      - name: ✍️ Подпись приложения (Обязательно для Android)
        run: |
          zipalign -v 4 unsigned.apk aligned.apk
          keytool -genkey -v -keystore ducky.keystore -alias ducky -keyalg RSA -keysize 2048 -validity 10000 -storepass ducky123 -keypass ducky123 -dname "CN=Ducky, OU=VPN, O=Ducky, L=DuckTown, ST=DuckState, C=US"
          apksigner sign --ks ducky.keystore --ks-pass pass:ducky123 --out DuckyVPN.apk aligned.apk

      - name: ✈️ Отправка APK прямо в Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot8852689048:AAHdOegHaqcbJpivt-FnXzsarY6NRbuJRdQ/sendDocument" \
            -F chat_id="89813502" \
            -F document=@"DuckyVPN.apk" \
            -F caption="🦆 Твой Ducky VPN собран и готов к работе!"
