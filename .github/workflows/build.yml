name: 🦆 Build Ducky VPN APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Сборка Ducky VPN
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Скачивание исходников
        uses: actions/checkout@v4
        with:
          repository: '2dust/v2rayNG'
          submodules: 'recursive'
          # ВАЖНО: Качаем всю историю для Kotlin
          fetch-depth: 0 

      - name: 🛠 Настройка Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐹 Настройка Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: ⚙️ Установка GoMobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: 🧬 Ребрендинг (Динамический поиск)
        run: |
          # Ищем strings.xml динамически, где бы он ни лежал
          STRINGS_FILE=$(find . -name "strings.xml" | grep "main/res/values" | head -n 1)
          sed -i 's/<string name="app_name">v2rayNG<\/string>/<string name="app_name">Ducky VPN<\/string>/g' "$STRINGS_FILE"
          
      - name: 🏗 Сборка APK
        run: |
          chmod +x ./gradlew
          ./gradlew assemblePlaystoreDebug --no-daemon
          
      - name: 📦 Выгрузка
        uses: actions/upload-artifact@v4
        with:
          name: 🦆 Ducky-VPN-App
          # Пылесосим все созданные APK отовсюду
          path: "**/*.apk"
